name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore services
        run: |
          dotnet restore ./ApiGateway/ApiGateway.csproj
          dotnet restore ./OrderService/OrderService.csproj
          dotnet restore ./InventoryService/InventoryService.csproj
          dotnet restore ./NotificationService/NotificationService.csproj
          dotnet restore ./ProductCatalogService/ProductCatalogService.csproj

      - name: Build services
        run: |
          dotnet build ./ApiGateway/ApiGateway.csproj -c Release --no-restore
          dotnet build ./OrderService/OrderService.csproj -c Release --no-restore
          dotnet build ./InventoryService/InventoryService.csproj -c Release --no-restore
          dotnet build ./NotificationService/NotificationService.csproj -c Release --no-restore
          dotnet build ./ProductCatalogService/ProductCatalogService.csproj -c Release --no-restore

      - name: Smoke test docker compose config
        run: docker compose config > /dev/null
