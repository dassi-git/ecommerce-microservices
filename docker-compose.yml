services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  apigateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_started
      productcatalogservice:
        condition: service_started
      orderservice:
        condition: service_started
      inventoryservice:
        condition: service_started
      notificationservice:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  productcatalogservice:
    build:
      context: ./ProductCatalogService
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  orderservice:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_started
      inventoryservice:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventoryservice:
    build:
      context: ./InventoryService
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  notificationservice:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
