services:
  ordersqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "14331:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  inventorysqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "14332:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  productcatalogmongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    expose:
      - "5672"
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    build:
      context: .
      dockerfile: ./prometheus.Dockerfile
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    expose:
      - "9090"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      productcatalogservice:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  apigateway:
    build:
      context: .
      dockerfile: ./ApiGateway/Dockerfile
    depends_on:
      productcatalogservice:
        condition: service_healthy
      orderservice:
        condition: service_healthy
      inventoryservice:
        condition: service_healthy
      notificationservice:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DOTNET_TieredCompilation: "0"
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://localhost:8080/health >/dev/null 2>&1 || curl -f http://localhost:8080/health >/dev/null 2>&1 || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  productcatalogservice:
    build:
      context: .
      dockerfile: ./ProductCatalogService/Dockerfile
    depends_on:
      productcatalogmongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      MongoDb__ConnectionString: mongodb://admin:admin123@productcatalogmongodb:27017
      MongoDb__DatabaseName: ProductCatalogDb
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://localhost:8080/health >/dev/null 2>&1 || curl -f http://localhost:8080/health >/dev/null 2>&1 || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  productcatalogservice-replica:
    build:
      context: .
      dockerfile: ./ProductCatalogService/Dockerfile
    depends_on:
      productcatalogmongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      MongoDb__ConnectionString: mongodb://admin:admin123@productcatalogmongodb:27017
      MongoDb__DatabaseName: ProductCatalogDb
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://localhost:8080/health >/dev/null 2>&1 || curl -f http://localhost:8080/health >/dev/null 2>&1 || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  orderservice:
    build:
      context: .
      dockerfile: ./OrderService/Dockerfile
    depends_on:
      ordersqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      Messaging__Enabled: "true"
      ConnectionStrings__OrderDb: Server=ordersqlserver,1433;Database=OrderDb;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=False;TrustServerCertificate=True;
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://localhost:8080/health >/dev/null 2>&1 || curl -f http://localhost:8080/health >/dev/null 2>&1 || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  inventoryservice:
    build:
      context: .
      dockerfile: ./InventoryService/Dockerfile
    depends_on:
      inventorysqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      Messaging__Enabled: "true"
      ConnectionStrings__InventoryDb: Server=inventorysqlserver,1433;Database=InventoryDb;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=False;TrustServerCertificate=True;
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://localhost:8080/health >/dev/null 2>&1 || curl -f http://localhost:8080/health >/dev/null 2>&1 || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  notificationservice:
    build:
      context: .
      dockerfile: ./NotificationService/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "(wget -qO- http://localhost:8080/health >/dev/null 2>&1 || curl -f http://localhost:8080/health >/dev/null 2>&1 || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  grafana-data:
